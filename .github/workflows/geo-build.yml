name: Build Custom Rules DAT

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository }}
  
jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/drdelabill/v2dat-runner:latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: image_name
        uses: vishalmamidi/lowercase-action@v1
        with:
          string: ${{ env.IMAGE_NAME }}

      - name: Fetch, Filter, Build and Verify
        run: |
          # 1. Загрузка исходных данных
          API_URL="https://api.github.com/repos/runetfreedom/russia-v2ray-rules-dat/releases/latest"
          GEOSITE_URL=$(curl -s $API_URL | jq -r '.assets[] | select(.name=="geosite.dat") | .browser_download_url')
          GEOIP_URL=$(curl -s $API_URL | jq -r '.assets[] | select(.name=="geoip.dat") | .browser_download_url')

          if [ -z "$GEOSITE_URL" ] || [ -z "$GEOIP_URL" ]; then
            echo "Ошибка: Не удалось получить ссылки на файлы."
            exit 1
          fi

          echo "Скачивание файлов..."
          curl -L -s -o geosite_full.dat $GEOSITE_URL
          curl -L -s -o geoip_full.dat $GEOIP_URL

          # 2. Распаковка сырых данных
          mkdir -p geosite_unpacked geoip_unpacked
          v2dat unpack geosite -o geosite_unpacked geosite_full.dat
          v2dat unpack geoip -o geoip_unpacked geoip_full.dat

          # 3. Подготовка директорий
          mkdir -p geosite_src geoip_src

          # 4. Фильтрация Geosite
          for tag in ru-available-only-inside win-spy category-ads-all private; do
            SRC_FILE="geosite_unpacked/geosite_full_${tag}.txt"
            if [ -f "$SRC_FILE" ]; then
              cp "$SRC_FILE" "geosite_src/${tag}"
            else
              echo "Geosite: Ошибка. Тег $tag не найден в апстриме."
              exit 1
            fi
          done

          # 5. Фильтрация GeoIP
          for tag in yandex private; do
            SRC_FILE="geoip_unpacked/geoip_full_${tag}.txt"
            if [ -f "$SRC_FILE" ]; then
              cp "$SRC_FILE" "geoip_src/${tag}.txt"
            else
              echo "GeoIP: Ошибка. Тег $tag не найден в апстриме."
              exit 1
            fi
          done

          # 6. Компиляция Geosite
          echo "Сборка geosite.dat..."
          domain-list-community -datapath ./geosite_src
          mv dlc.dat geosite.dat

          # 7. Компиляция GeoIP (Исправленный синтаксис)
          echo "Сборка geoip.dat..."
          cat <<EOF > geoip_config.json
          {
            "input": [
              {
                "type": "text",
                "action": "add",
                "args": {
                  "name": "yandex",
                  "uri": "./geoip_src/yandex.txt"
                }
              },
              {
                "type": "text",
                "action": "add",
                "args": {
                  "name": "private",
                  "uri": "./geoip_src/private.txt"
                }
              }
            ],
            "output": [
              {
                "type": "v2rayGeoIPDat",
                "action": "output",
                "args": {
                  "filename": "geoip.dat"
                }
              }
            ]
          }
          EOF
          geoip -c geoip_config.json
          mv output/dat/geoip.dat ./geoip.dat

          # === ВЕРИФИКАЦИЯ (Проверка итоговых файлов) ===
          echo "Запуск проверки сгенерированных файлов..."
          mkdir -p verify_geosite verify_geoip
          v2dat unpack geosite -o verify_geosite geosite.dat
          v2dat unpack geoip -o verify_geoip geoip.dat

          echo "Проверка целостности Geosite..."
          for tag in ru-available-only-inside win-spy category-ads-all private; do
            if [ ! -f "verify_geosite/${tag}" ]; then
              echo "КРИТИЧЕСКАЯ ОШИБКА: Тег $tag отсутствует в итоговом geosite.dat!"
              exit 1
            fi
          done

          echo "Проверка целостности GeoIP..."
          for tag in yandex private; do
            if [ ! -f "verify_geoip/${tag}" ]; then
              echo "КРИТИЧЕСКАЯ ОШИБКА: Тег $tag отсутствует в итоговом geoip.dat!"
              exit 1
            fi
          done
          echo "Верификация пройдена успешно. Все категории интегрированы корректно."

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            geosite.dat
            geoip.dat
          tag_name: latest
          name: Custom Lightweight Rules
          body: "Автоматическая сборка для мобильных клиентов (до 50 МБ).\nВключены теги:\n- **geosite:** ru-available-only-inside, win-spy, category-ads-all, private\n- **geoip:** yandex, private"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # - name: Keep-alive commit
      #   run: |
      #     DAY=$(date +%d)
      #     if [ "$DAY" = "01" ] || [ "$DAY" = "15" ]; then
      #       git config --global user.name "github-actions[bot]"
      #       git config --global user.email "github-actions[bot]@users.noreply.github.com"
      #       git commit --allow-empty -m "chore: keep-alive cron job"
      #       git push origin HEAD
      #     fi